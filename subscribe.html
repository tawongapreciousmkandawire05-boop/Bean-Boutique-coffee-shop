<!DOCTYPE html>
<html>
  <head>
    <title>Bean Boutique | Subscribe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap navBar">
        <a class="brand" href="index.html"><i class="fa-solid fa-mug-saucer"></i> Bean Boutique</a>
        <button class="menu" type="button" aria-label="Open menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="nav">
          <a class="navLink" href="index.html">Home</a>
          <a class="navLink" href="coffee.html">Coffee</a>
          <a class="navLink" href="equipment.html">Equipment</a>
          <a class="navLink" href="events.html">Events</a>
          <a class="navLink" href="offers.html">Offers</a>
          <a class="navLink" href="cart.html">Cart <span class="cartCount">0</span></a>
          <a class="navLink active" href="subscribe.html">Subscribe</a>
        </nav>
      </div>
    </header>

    <main class="main wrap">
      <section class="pageIntro">
        <h1 class="pageTitle">Subscribe for monthly coffee joy</h1>
        <p>Receive curated beans, brewing tips, and exclusive event access every month.</p>
      </section>

      <section class="formBox">
        <form id="subscribeForm">
          <label class="fieldLabel" for="name">Name</label>
          <input id="name" type="text" class="field" required />

          <label class="fieldLabel" for="email">Email</label>
          <input id="email" type="email" class="field" required />

          <button class="button" type="submit">Subscribe</button>
        </form>
        <div id="subscribeMessage" class="message"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="wrap footerInner">
        <p>© 2026 Bean Boutique. Crafted for coffee lovers.</p>
        <div class="socials">
          <a href="https://www.instagram.com"><i class="fa-brands fa-instagram"></i></a>
          <a href="https://www.facebook.com"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="https://www.twitter.com"><i class="fa-brands fa-x-twitter"></i></a>
          <a href="https://www.whatsapp.com"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
